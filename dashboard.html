<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LASE Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container py-3">

<!-- Header -->
<div class="d-flex justify-content-between align-items-center mb-3">
<div>
<h5 class="mb-0" id="welcomeName">Good Morning</h5>
<small class="text-muted">Welcome to LASE</small>
</div>
<div class="d-flex align-items-center gap-3">
<span class="bell">🔔</span>
<div class="avatar">L</div>
</div>
</div>

<!-- Debit Card -->
<div class="debit-card p-4 mb-4">
<div class="d-flex justify-content-between">
<div>
<p class="mb-1">LASE</p>
<h2 id="balance">$0.00</h2>
</div>
<div>💳</div>
</div>
<p class="mt-4 mb-0">**** **** **** 4521</p>
</div>

<!-- Quick Actions -->
<div class="row text-center g-3 mb-4">
<div class="col-4">
<a href="send.html" style="text-decoration:none;color:inherit">
<div class="action-card">💸<p>Send</p></div>
</a>
</div>
<div class="col-4">
<div class="action-card">🏦<p>Deposit</p></div>
</div>

<div class="col-4">
<div class="action-card">⚙️<p>Settings</p></div>
</div>
</div>

<!-- Spending Chart -->
<div class="card shadow-sm mb-4">
<div class="card-body">
<h6>Weekly Spending</h6>
<canvas id="spendChart"></canvas>
</div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
<div>🏠<br>Home</div>
<div>💳<br>Cards</div>
<div>💸<br>Send</div>
<div>⏳<br>Pending</div>
<div>👤<br>Profile</div>
</div>

<script src="script.js"></script>
</body>
</html>
