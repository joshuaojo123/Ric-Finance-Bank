<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Send Money</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container py-4">

<a href="dashboard.html" class="back-btn">← Back</a>

<div class="card p-4 shadow-sm mt-3">
<h6 class="mb-3">Recipient Details</h6>
<input id="name" class="form-control mb-3" placeholder="Recipient Name">
<input id="account" class="form-control mb-3" placeholder="Account Number">
<select class="form-control mb-3">
<option>LASE</option>
</select>
<input id="amount" class="form-control mb-3" placeholder="$ Amount">
<input id="note" class="form-control" placeholder="Note (optional)">
<button onclick="sendMoney()" class="btn btn-primary w-100 mt-3">Send Transfer</button>
<p id="msg" class="text-center mt-3"></p>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
