<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pending Transfers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f6f6fb;
    font-family: Arial, sans-serif;
}

.header{
    background:#40196d;
    color:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.card-box{
    background:white;
    border-radius:12px;
    padding:15px;
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.status{
    background:#fff3cd;
    color:#856404;
    padding:5px 10px;
    border-radius:8px;
    font-size:12px;
}

.back-btn{
    background:#40196d;
    color:white;
    border:none;
    width:100%;
    padding:10px;
    border-radius:10px;
}

.back-btn:hover{
    background:#321354;
}

</style>

</head>
<body>

<div class="container py-4">

<!-- HEADER -->
<div class="header">
<h5 class="mb-0">Pending Transfers</h5>
<small>Transfers waiting to be completed</small>
</div>

<!-- PENDING LIST -->
<div id="pendingList"></div>

<!-- BACK BUTTON -->
<a href="dashboard.html">
<button class="back-btn mt-3">Back to Dashboard</button>
</a>

</div>

<script src="script.js"></script>

</body>
</html>
