<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Richards Bank Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">



</head>
<body>

<div class="container vh-100 d-flex align-items-center justify-content-center">

<div class="login-card p-4">

<div class="text-center mb-4">

<h2 class="bank-name">Richards Bank</h2>

<p class="text-muted small-text">
The smart way to bank
</p>

</div>

<input id="name" class="form-control mb-3" placeholder="Full Name">

<input id="email" class="form-control mb-3" placeholder="Email Address">

<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<button onclick="login()" class="btn login-btn w-100">
Sign In
</button>

<p class="text-center mt-3 text-muted small-text">
Demo Login • Secure Banking
</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
